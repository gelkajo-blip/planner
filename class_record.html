<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기탄생각교실 · 수업기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2ed;
  --card: #fffdf9;
  --brown: #3d2b1f;
  --brown2: #7a5c44;
  --brown3: #b8977e;
  --border: #e4d8c8;
  --ink: #2a1f1a;
  --ink2: #5a4030;
  --green: #4a8c5c;
  --green-l: #eaf4ee;
  --orange: #c8601a;
  --orange-l: #fdf0e6;
  --red: #c04040;
  --red-l: #fdeaea;
  --shadow: 0 2px 12px rgba(61,43,31,0.08);
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

/* NAV */
.nav { background: var(--brown); position: sticky; top: 0; z-index: 100; }
.nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.1rem; }
.nav-title { font-family: 'Noto Serif KR', serif; color: #fff; font-size: 1rem; font-weight: 700; }
.nav-sub { color: rgba(255,255,255,0.45); font-size: 0.6rem; margin-top: 0.1rem; }
.nav-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.85); border-radius: 99px; padding: 0.38rem 0.8rem; font-size: 0.75rem; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }

/* PAGE */
.page { display: none; padding: 1rem; max-width: 520px; margin: 0 auto; padding-bottom: 5rem; }
.page.on { display: block; }

/* TOAST */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--brown); color: #fff; padding: 0.55rem 1.2rem; border-radius: 99px; font-size: 0.78rem; opacity: 0; transition: all 0.25s; z-index: 999; pointer-events: none; white-space: nowrap; }
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* STUDENT LIST */
.top-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.search { flex: 1; border: 1.5px solid var(--border); border-radius: 99px; padding: 0.55rem 1rem; font-size: 0.82rem; font-family: 'Noto Sans KR', sans-serif; background: var(--card); outline: none; color: var(--ink); }
.search:focus { border-color: var(--brown3); }
.add-s-btn { background: var(--brown); color: #fff; border: none; border-radius: 99px; padding: 0.55rem 1rem; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }

.s-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.7rem; }
.s-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1rem 0.8rem; cursor: pointer; text-align: center; transition: all 0.15s; box-shadow: var(--shadow); }
.s-card:active { transform: scale(0.97); }
.s-card.today { border-color: var(--green); background: var(--green-l); }
.s-avatar { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg, var(--brown3), var(--brown)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-family: 'Noto Serif KR', serif; font-weight: 700; margin: 0 auto 0.5rem; }
.s-name { font-size: 0.9rem; font-weight: 700; color: var(--brown); }
.s-grade { font-size: 0.68rem; color: var(--brown3); margin-top: 0.15rem; }
.s-badge { font-size: 0.65rem; margin-top: 0.35rem; padding: 0.15rem 0.5rem; border-radius: 99px; display: inline-block; background: var(--border); color: var(--brown2); }
.s-card.today .s-badge { background: var(--green); color: #fff; }

/* RECORD */
.back { display: flex; align-items: center; gap: 0.35rem; background: none; border: none; color: var(--brown2); font-size: 0.82rem; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-bottom: 0.9rem; padding: 0.2rem 0; }

.rec-head { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.8rem; box-shadow: var(--shadow); display: flex; align-items: center; gap: 0.8rem; }
.rec-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--brown3), var(--brown)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-family: 'Noto Serif KR', serif; font-weight: 700; flex-shrink: 0; }
.rec-info { flex: 1; }
.rec-name { font-size: 1rem; font-weight: 700; color: var(--brown); }
.rec-meta { font-size: 0.7rem; color: var(--brown3); margin-top: 0.1rem; }
.date-inp { border: 1.5px solid var(--border); border-radius: 8px; padding: 0.35rem 0.6rem; font-size: 0.8rem; font-family: 'Noto Sans KR', sans-serif; color: var(--ink); background: var(--bg); outline: none; cursor: pointer; }
.date-inp:focus { border-color: var(--brown3); }

/* SECTION */
.sec { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.8rem; box-shadow: var(--shadow); }
.sec-title { font-size: 0.7rem; font-weight: 700; color: var(--brown3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.8rem; }

/* SUBJECT TABS */
.subj-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
.subj-tab { padding: 0.35rem 0.85rem; border-radius: 99px; font-size: 0.78rem; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; color: var(--ink2); font-weight: 500; transition: all 0.15s; white-space: nowrap; }
.subj-tab.on { background: var(--brown); border-color: var(--brown); color: #fff; font-weight: 700; }
.subj-tab.add-tab { border-style: dashed; color: var(--brown3); }

/* BOOK ITEM */
.book-item { border: 1.5px solid var(--border); border-radius: 10px; padding: 0.7rem 0.8rem; margin-bottom: 0.5rem; background: var(--bg); transition: all 0.15s; }
.book-item.done { opacity: 0.45; }
.book-top { display: flex; align-items: center; gap: 0.5rem; }
.book-cb { appearance: none; -webkit-appearance: none; width: 22px; height: 22px; min-width: 22px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; position: relative; transition: all 0.15s; flex-shrink: 0; }
.book-cb:checked { background: var(--green); border-color: var(--green); }
.book-cb:checked::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; }
.book-name { flex: 1; font-size: 0.85rem; font-weight: 600; color: var(--ink); }
.book-del { background: none; border: none; color: var(--brown3); font-size: 0.9rem; cursor: pointer; padding: 0.1rem 0.2rem; line-height: 1; }
.book-bottom { display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center; }
.prog-inp { flex: 1; border: 1.5px solid var(--border); border-radius: 7px; padding: 0.38rem 0.6rem; font-size: 0.78rem; font-family: 'Noto Sans KR', sans-serif; background: #fff; outline: none; color: var(--ink); }
.prog-inp:focus { border-color: var(--brown3); }
.next-tag { font-size: 0.7rem; color: var(--green); background: var(--green-l); border-radius: 6px; padding: 0.2rem 0.5rem; white-space: nowrap; }

/* 다음 교재 입력 (완료 체크 시 표시) */
.next-book-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center; }
.next-book-label { font-size: 0.72rem; color: var(--green); white-space: nowrap; font-weight: 600; }
.next-book-inp { flex: 1; border: 1.5px solid var(--green); border-radius: 7px; padding: 0.38rem 0.6rem; font-size: 0.78rem; font-family: 'Noto Sans KR', sans-serif; background: var(--green-l); outline: none; color: var(--ink); }
.next-book-inp:focus { border-color: var(--green); }

.add-book-row { display: flex; gap: 0.4rem; margin-top: 0.6rem; }
.add-book-inp { flex: 1; border: 1.5px solid var(--border); border-radius: 8px; padding: 0.45rem 0.7rem; font-size: 0.82rem; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); outline: none; color: var(--ink); }
.add-book-inp:focus { border-color: var(--brown3); }
.add-book-btn { background: var(--brown); color: #fff; border: none; border-radius: 8px; padding: 0.45rem 0.8rem; font-size: 0.82rem; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }

/* 오늘 학습 내용 */
.content-area { width: 100%; border: 1.5px solid var(--border); border-radius: 9px; padding: 0.65rem 0.8rem; font-size: 0.85rem; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); outline: none; resize: none; line-height: 1.65; color: var(--ink); margin-top: 0.7rem; transition: border-color 0.15s; }
.content-area:focus { border-color: var(--brown3); background: #fff; }
.field-label { font-size: 0.72rem; color: var(--brown2); font-weight: 600; margin-bottom: 0.3rem; }

/* MEMO */
.memo-area { width: 100%; border: 1.5px solid var(--border); border-radius: 9px; padding: 0.65rem 0.8rem; font-size: 0.85rem; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); outline: none; resize: none; line-height: 1.65; color: var(--ink); transition: border-color 0.15s; }
.memo-area:focus { border-color: var(--brown3); background: #fff; }

/* SAVE BTN */
.save-btn { width: 100%; padding: 0.9rem; background: var(--brown); color: #fff; border: none; border-radius: var(--radius); font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 0.3rem; box-shadow: 0 4px 16px rgba(61,43,31,0.18); transition: all 0.15s; }
.save-btn:active { transform: scale(0.98); }

/* HISTORY */
.hist-wrap { margin-top: 1.5rem; }
.hist-label { font-size: 0.72rem; font-weight: 700; color: var(--brown3); letter-spacing: 0.1em; margin-bottom: 0.6rem; }
.hist-item { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 0.85rem 1rem; margin-bottom: 0.6rem; box-shadow: var(--shadow); }
.hist-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.hist-date { font-size: 0.75rem; font-weight: 700; color: var(--brown); }
.hist-del { background: none; border: none; color: var(--brown3); font-size: 0.85rem; cursor: pointer; }
.hist-subj { font-size: 0.72rem; font-weight: 700; color: var(--brown2); margin-bottom: 0.2rem; }
.hist-content { font-size: 0.8rem; color: var(--ink2); line-height: 1.6; }
.hist-note { font-size: 0.78rem; color: var(--brown2); margin-top: 0.4rem; padding-top: 0.4rem; border-top: 1px solid var(--border); }
.empty { text-align: center; padding: 2.5rem 1rem; color: var(--brown3); font-size: 0.82rem; }

/* COPY PAGE */
.copy-head { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.copy-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
.copy-sel { border: 1.5px solid var(--border); border-radius: 8px; padding: 0.45rem 0.7rem; font-size: 0.82rem; font-family: 'Noto Sans KR', sans-serif; color: var(--ink); background: var(--bg); outline: none; cursor: pointer; }
.copy-gen-btn { background: var(--orange); color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.copy-box { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); }
.copy-box h3 { font-family: 'Noto Serif KR', serif; font-size: 0.9rem; color: var(--brown); margin-bottom: 0.7rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
.copy-textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 9px; padding: 0.7rem 0.9rem; font-size: 0.82rem; font-family: 'Noto Sans KR', sans-serif; color: var(--ink); background: var(--bg); outline: none; resize: none; line-height: 1.7; min-height: 200px; }
.copy-textarea:focus { border-color: var(--brown3); background: #fff; }
.copy-btn-row { display: flex; gap: 0.5rem; margin-top: 0.7rem; }
.copy-btn { background: var(--brown2); color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.claude-tip { background: var(--orange-l); border: 1.5px solid #f0c090; border-radius: 10px; padding: 0.8rem 1rem; margin-top: 0.8rem; font-size: 0.78rem; color: var(--ink2); line-height: 1.6; }
.claude-tip b { color: var(--orange); }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.overlay.on { opacity: 1; pointer-events: all; }
.modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 1.5rem 1.2rem; width: 100%; transform: translateY(100%); transition: transform 0.3s; }
.overlay.on .modal { transform: translateY(0); }
.modal-title { font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: var(--brown); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
.modal-x { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--brown3); }
.modal-inp { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 0.65rem 0.9rem; font-size: 0.9rem; font-family: 'Noto Sans KR', sans-serif; color: var(--ink); background: var(--bg); outline: none; margin-bottom: 0.7rem; }
.modal-inp:focus { border-color: var(--brown3); }
.modal-sel { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 0.65rem 0.9rem; font-size: 0.9rem; font-family: 'Noto Sans KR', sans-serif; color: var(--ink); background: var(--bg); outline: none; margin-bottom: 0.7rem; cursor: pointer; }
.modal-submit { width: 100%; padding: 0.85rem; background: var(--brown); color: #fff; border: none; border-radius: 10px; font-size: 0.92rem; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div>
      <div class="nav-title">기탄생각교실</div>
      <div class="nav-sub">수업기록</div>
    </div>
    <button class="nav-btn" onclick="showPage('copy')">📋 Claude용 복사</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 학생 목록 -->
<div class="page on" id="page-list">
  <div class="top-bar">
    <input class="search" id="searchInp" placeholder="🔍 학생 검색..." oninput="renderList(this.value)">
    <button class="add-s-btn" onclick="openModal()">+ 학생</button>
  </div>
  <div class="s-grid" id="sGrid"></div>
</div>

<!-- 수업 기록 -->
<div class="page" id="page-rec">
  <button class="back" onclick="showPage('list')">← 목록</button>

  <div class="rec-head">
    <div class="rec-avatar" id="recAvatar"></div>
    <div class="rec-info">
      <div class="rec-name" id="recName"></div>
      <div class="rec-meta" id="recMeta"></div>
    </div>
    <input type="date" class="date-inp" id="recDate">
  </div>

  <!-- 과목·교재·진도 -->
  <div class="sec">
    <div class="sec-title">📚 과목 · 교재 · 진도</div>
    <div class="subj-tabs" id="subjTabs"></div>
    <div id="subjPanel"></div>
  </div>

  <!-- 메모 -->
  <div class="sec">
    <div class="sec-title">📝 메모</div>
    <textarea class="memo-area" id="recMemo" rows="3" placeholder="컨디션, 특이사항, 전달사항 등 자유롭게"></textarea>
  </div>

  <button class="save-btn" onclick="saveRec()">💾 저장</button>

  <div class="hist-wrap">
    <div class="hist-label">이전 기록</div>
    <div id="histList"></div>
  </div>
</div>

<!-- Claude용 복사 -->
<div class="page" id="page-copy">
  <button class="back" onclick="showPage('list')">← 목록</button>
  <div class="copy-head">
    <div class="copy-controls">
      <select class="copy-sel" id="copyStu"><option value="">학생 선택</option></select>
      <select class="copy-sel" id="copyMonth">
        <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
        <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
        <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
        <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
      </select>
      <button class="copy-gen-btn" onclick="genCopy()">기록 불러오기</button>
    </div>
  </div>
  <div id="copyResult"></div>
</div>

<!-- 학생 추가 모달 -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title">
      학생 등록
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <input class="modal-inp" id="mName" placeholder="이름">
    <select class="modal-sel" id="mGrade">
      <option value="">학년 선택</option>
      <option>유아(6세)</option><option>유아(7세)</option>
      <option>초1</option><option>초2</option><option>초3</option>
      <option>초4</option><option>초5</option><option>초6</option>
    </select>
    <input class="modal-inp" id="mSubjects" placeholder="과목 (예: 수학, 국어, 사고력)">
    <button class="modal-submit" onclick="addStudent()">등록</button>
  </div>
</div>

<script>
// ── DB ────────────────────────────────────────────
const KEY = 'gitan_v1';
let DB = { students: [], records: {} };

function dbSave(){ localStorage.setItem(KEY, JSON.stringify(DB)); }
function dbLoad(){ try { const d = localStorage.getItem(KEY); if(d) DB = JSON.parse(d); } catch(e){} }

// ── 상태 ─────────────────────────────────────────
let curSid = null;
let curSubj = '';
let contentCache = {}; // 과목별 학습내용 임시 저장

// ── TOAST ─────────────────────────────────────────
let tt;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(tt); tt = setTimeout(()=>el.classList.remove('on'), 2000);
}

// ── PAGE ─────────────────────────────────────────
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  if(id==='list') renderList();
  if(id==='copy') renderCopySelect();
}

// ── 학생 목록 ──────────────────────────────────────
function renderList(q=''){
  const grid = document.getElementById('sGrid');
  const today = todayStr();
  const filtered = DB.students.filter(s=>s.name.includes(q));
  if(!filtered.length){
    grid.innerHTML = `<div class="empty">${q ? '검색 결과 없음' : '학생을 추가해주세요 😊'}</div>`;
    return;
  }
  grid.innerHTML = filtered.map(s=>{
    const recs = DB.records[s.id]||[];
    const hasToday = recs.some(r=>r.date===today);
    const cnt = recs.length;
    return `<div class="s-card ${hasToday?'today':''}" onclick="openRec('${s.id}')">
      <div class="s-avatar">${s.name[0]}</div>
      <div class="s-name">${s.name}</div>
      <div class="s-grade">${s.grade||''}</div>
      <div class="s-badge">${hasToday ? '✅ 오늘 기록' : cnt ? cnt+'회 기록' : '기록 없음'}</div>
    </div>`;
  }).join('');
}

// ── 학생 추가 ──────────────────────────────────────
function openModal(){ document.getElementById('modal').classList.add('on'); setTimeout(()=>document.getElementById('mName').focus(),300); }
function closeModal(){ document.getElementById('modal').classList.remove('on'); }

function addStudent(){
  const name = document.getElementById('mName').value.trim();
  const grade = document.getElementById('mGrade').value;
  const subjStr = document.getElementById('mSubjects').value.trim();
  if(!name){ toast('이름을 입력해주세요'); return; }

  // 과목 파싱
  const subjects = subjStr ? subjStr.split(/[,，\s]+/).filter(Boolean) : ['수학','국어','사고력'];

  const s = { id:'s'+Date.now(), name, grade, subjects };
  DB.students.push(s);
  DB.records[s.id] = [];
  dbSave();
  closeModal();
  document.getElementById('mName').value='';
  document.getElementById('mGrade').value='';
  document.getElementById('mSubjects').value='';
  renderList();
  toast('✅ '+name+' 등록 완료!');
}

// ── 기록 화면 열기 ─────────────────────────────────
function openRec(sid){
  curSid = sid;
  contentCache = {};
  const s = DB.students.find(s=>s.id===sid);
  const recs = DB.records[sid]||[];

  document.getElementById('recAvatar').textContent = s.name[0];
  document.getElementById('recName').textContent = s.name;
  document.getElementById('recMeta').textContent = (s.grade||'') + ' · ' + recs.length + '회 기록';
  document.getElementById('recDate').value = todayStr();
  document.getElementById('recMemo').value = '';

  // 첫 번째 과목으로 시작
  curSubj = s.subjects?.[0] || '수학';
  renderSubjTabs();
  renderHistory();
  showPageDirect('rec');
}

function showPageDirect(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
}

// ── 과목 탭 ───────────────────────────────────────
function renderSubjTabs(){
  const s = DB.students.find(s=>s.id===curSid);
  const subjs = s.subjects||['수학'];

  document.getElementById('subjTabs').innerHTML =
    subjs.map(subj=>`<button class="subj-tab ${subj===curSubj?'on':''}" onclick="switchSubj('${subj}')">${subj}</button>`).join('') +
    `<button class="subj-tab add-tab" onclick="addSubject()">＋</button>`;

  renderPanel();
}

function switchSubj(subj){
  // 현재 내용 캐시
  const ta = document.getElementById('contentArea');
  if(ta) contentCache[curSubj] = ta.value;
  curSubj = subj;
  renderSubjTabs();
}

function addSubject(){
  const name = prompt('과목 이름을 입력하세요');
  if(!name?.trim()) return;
  const s = DB.students.find(s=>s.id===curSid);
  if(!s.subjects) s.subjects=[];
  if(s.subjects.includes(name.trim())){ toast('이미 있는 과목이에요'); return; }
  s.subjects.push(name.trim());
  dbSave();
  curSubj = name.trim();
  renderSubjTabs();
}

// ── 패널 (교재 목록 + 학습 내용) ───────────────────
function renderPanel(){
  const s = DB.students.find(s=>s.id===curSid);
  if(!s.books) s.books = {};
  if(!s.books[curSubj]) s.books[curSubj] = [];
  const books = s.books[curSubj];
  const cached = contentCache[curSubj]||'';

  const booksHtml = books.length
    ? books.map((b,i)=>bookHtml(b,i)).join('')
    : `<div style="font-size:0.78rem;color:var(--brown3);padding:0.3rem 0 0.6rem">교재를 추가해주세요</div>`;

  document.getElementById('subjPanel').innerHTML = `
    <div id="bookList">${booksHtml}</div>
    <div class="add-book-row">
      <input class="add-book-inp" id="newBook" placeholder="교재명 추가..." onkeydown="if(event.key==='Enter')addBook()">
      <button class="add-book-btn" onclick="addBook()">＋</button>
    </div>
    <div style="margin-top:0.8rem">
      <div class="field-label">오늘 학습 내용</div>
      <textarea class="content-area" id="contentArea" rows="2" placeholder="오늘 배운 내용, 잘한 부분, 어려웠던 부분...">${cached}</textarea>
    </div>`;
}

function bookHtml(b, i){
  const nextRow = b.done ? `
    <div class="next-book-row">
      <span class="next-book-label">→ 다음 교재</span>
      <input class="next-book-inp" value="${b.nextBook||''}" placeholder="다음 교재명..."
        onchange="updateNextBook('${curSubj}',${i},this.value)">
    </div>` : (b.nextBook ? `<div class="next-tag" style="margin-top:0.4rem">→ 다음: ${b.nextBook}</div>` : '');

  return `<div class="book-item ${b.done?'done':''}">
    <div class="book-top">
      <input type="checkbox" class="book-cb" ${b.done?'checked':''}
        onchange="toggleBook('${curSubj}',${i},this.checked)">
      <span class="book-name">${b.name}</span>
      <button class="book-del" onclick="delBook('${curSubj}',${i})">🗑</button>
    </div>
    <div class="book-bottom">
      <input class="prog-inp" value="${b.progress||''}" placeholder="진도 (예: p.24~28)"
        onchange="updateProg('${curSubj}',${i},this.value)">
    </div>
    ${nextRow}
  </div>`;
}

// ── 교재 CRUD ─────────────────────────────────────
function getBooks(subj){
  const s = DB.students.find(s=>s.id===curSid);
  if(!s.books) s.books={};
  if(!s.books[subj]) s.books[subj]=[];
  return s.books[subj];
}

function addBook(){
  const inp = document.getElementById('newBook');
  const name = inp?.value.trim();
  if(!name){ toast('교재명을 입력해주세요'); return; }
  getBooks(curSubj).push({name, progress:'', done:false, nextBook:''});
  dbSave(); inp.value=''; renderPanel();
}

function toggleBook(subj, i, done){
  const ta = document.getElementById('contentArea');
  if(ta) contentCache[curSubj] = ta.value;
  const books = getBooks(subj);
  books[i].done = done;
  dbSave(); renderPanel();
  if(done) toast('✅ 완료! 다음 교재를 입력해주세요');
}

function updateProg(subj, i, val){
  getBooks(subj)[i].progress = val; dbSave();
}

function updateNextBook(subj, i, val){
  getBooks(subj)[i].nextBook = val; dbSave();
}

function delBook(subj, i){
  const ta = document.getElementById('contentArea');
  if(ta) contentCache[curSubj] = ta.value;
  getBooks(subj).splice(i,1);
  dbSave(); renderPanel();
}

// ── 저장 ──────────────────────────────────────────
function saveRec(){
  // 현재 탭 내용 캐시
  const ta = document.getElementById('contentArea');
  if(ta) contentCache[curSubj] = ta.value;

  const date = document.getElementById('recDate').value;
  const memo = document.getElementById('recMemo').value.trim();
  const s = DB.students.find(s=>s.id===curSid);

  // 과목별 데이터 수집
  const subjData = {};
  (s.subjects||[]).forEach(subj=>{
    const books = getBooks(subj);
    const content = contentCache[subj]||'';
    if(books.length||content) subjData[subj] = { books: JSON.parse(JSON.stringify(books)), content };
  });

  if(!Object.keys(subjData).length && !memo){ toast('내용을 입력해주세요'); return; }

  const rec = { id:'r'+Date.now(), date, subjData, memo };

  if(!DB.records[curSid]) DB.records[curSid]=[];
  const ei = DB.records[curSid].findIndex(r=>r.date===date);
  if(ei>=0) DB.records[curSid][ei]=rec;
  else DB.records[curSid].unshift(rec);

  dbSave();
  contentCache={};
  document.getElementById('recMemo').value='';
  document.getElementById('recMeta').textContent = (s.grade||'')+' · '+(DB.records[curSid].length)+'회 기록';
  renderHistory();
  renderPanel();
  toast('✅ 저장 완료!');
}

// ── 이전 기록 ─────────────────────────────────────
function renderHistory(){
  const recs = (DB.records[curSid]||[]).slice(0,8);
  const el = document.getElementById('histList');
  if(!recs.length){ el.innerHTML='<div class="empty">아직 기록이 없어요</div>'; return; }

  el.innerHTML = recs.map(r=>{
    const subjLines = Object.entries(r.subjData||{}).map(([subj,v])=>{
      const activeBooks = (v.books||[]).filter(b=>!b.done).map(b=>b.name+(b.progress?' ('+b.progress+')':'')).join(', ');
      const doneBooks = (v.books||[]).filter(b=>b.done).map(b=>b.name+(b.nextBook?' →'+b.nextBook:'')).join(', ');
      return `<div class="hist-subj">${subj}</div>
        <div class="hist-content">${activeBooks||''}${doneBooks?'<span style="color:var(--green)"> ✅'+doneBooks+'</span>':''}${v.content?' — '+v.content:''}</div>`;
    }).join('');

    return `<div class="hist-item">
      <div class="hist-top">
        <span class="hist-date">📅 ${fmtDate(r.date)}</span>
        <button class="hist-del" onclick="delRec('${r.id}')">🗑</button>
      </div>
      ${subjLines}
      ${r.memo?`<div class="hist-note">📝 ${r.memo}</div>`:''}
    </div>`;
  }).join('');
}

function delRec(rid){
  if(!confirm('삭제할까요?')) return;
  DB.records[curSid] = (DB.records[curSid]||[]).filter(r=>r.id!==rid);
  dbSave(); renderHistory(); toast('삭제됨');
}

// ── Claude용 복사 ─────────────────────────────────
function renderCopySelect(){
  const sel = document.getElementById('copyStu');
  sel.innerHTML = '<option value="">학생 선택</option>' +
    DB.students.map(s=>`<option value="${s.id}">${s.name} (${s.grade||''})</option>`).join('');
  document.getElementById('copyMonth').value = new Date().getMonth()+1;
}

function genCopy(){
  const sid = document.getElementById('copyStu').value;
  const month = parseInt(document.getElementById('copyMonth').value);
  const el = document.getElementById('copyResult');

  if(!sid){ toast('학생을 선택해주세요'); return; }

  const s = DB.students.find(s=>s.id===sid);
  const recs = (DB.records[sid]||[]).filter(r=>parseInt(r.date?.split('-')[1])===month);

  if(!recs.length){
    el.innerHTML=`<div class="empty">${month}월 기록이 없어요</div>`; return;
  }

  // 텍스트 생성
  let text = `[${s.name} / ${s.grade||''} / ${month}월 수업기록 — 총 ${recs.length}회]\n\n`;

  recs.forEach(r=>{
    text += `📅 ${fmtDate(r.date)}\n`;
    Object.entries(r.subjData||{}).forEach(([subj,v])=>{
      text += `[${subj}]\n`;
      const activeBooks = (v.books||[]).filter(b=>!b.done);
      const doneBooks = (v.books||[]).filter(b=>b.done);
      if(activeBooks.length) text += `교재: ${activeBooks.map(b=>b.name+(b.progress?' '+b.progress:'')).join(', ')}\n`;
      if(doneBooks.length) text += `완료: ${doneBooks.map(b=>b.name+(b.nextBook?' → 다음:'+b.nextBook:'')).join(', ')}\n`;
      if(v.content) text += `내용: ${v.content}\n`;
    });
    if(r.memo) text += `메모: ${r.memo}\n`;
    text += '\n';
  });

  el.innerHTML = `
    <div class="copy-box">
      <h3>📋 ${s.name} ${month}월 기록 (${recs.length}회)</h3>
      <textarea class="copy-textarea" id="copyText" rows="14">${text.trim()}</textarea>
      <div class="copy-btn-row">
        <button class="copy-btn" onclick="doCopy()">📋 복사하기</button>
      </div>
      <div class="claude-tip">
        💡 <b>Claude에게 붙여넣고 이렇게 써보세요</b><br>
        "이 수업 기록으로 학부모에게 보낼 ${month}월 학습 리포트를 따뜻하게 작성해줘"
      </div>
    </div>`;
}

function doCopy(){
  const ta = document.getElementById('copyText');
  if(!ta) return;
  navigator.clipboard.writeText(ta.value)
    .then(()=>toast('📋 복사됐어요! Claude에 붙여넣으세요'))
    .catch(()=>{ ta.select(); document.execCommand('copy'); toast('📋 복사됐어요!'); });
}

// ── 유틸 ─────────────────────────────────────────
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(str){
  if(!str) return '';
  const [,m,d] = str.split('-');
  return `${parseInt(m)}월 ${parseInt(d)}일`;
}

// ── MODAL ─────────────────────────────────────────
document.getElementById('modal').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal')) closeModal();
});

// ── INIT ─────────────────────────────────────────
dbLoad();
renderList();
</script>
